<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra-Deck WASM</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #1a1a2e; 
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffff00;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="loading">Loading...</div>

    <script type="module">
        import { CanvasApplication } from './terradeck_wasm.js';

        async function init() {
            try {
                document.getElementById('loading').style.display = 'none';
                const app = new CanvasApplication('game-canvas');
                app.run();
                
                // Setup event handlers
                const canvas = document.getElementById('game-canvas');
                canvas.addEventListener('mousedown', (e) => app.on_mousedown(e));
                canvas.addEventListener('keydown', (e) => app.on_keydown(e));
                canvas.addEventListener('mousemove', (e) => app.on_mousemove(e));
                canvas.addEventListener('mouseup', (e) => app.on_mouseup(e));
                
                console.log('Terra-Deck WASM initialized successfully!');
                console.log('Click your cards to attack!');
            } catch (err) {
                console.error('Failed to initialize:', err);
                document.getElementById('loading').textContent = 'Error loading game';
                document.getElementById('loading').style.color = '#ff0000';
            }
        }

        init();
    </script>
</body>
</html>
