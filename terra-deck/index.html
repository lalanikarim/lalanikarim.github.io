<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra-Deck WASM</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #1a1a2e; 
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            width: 1024px;
            height: 600px;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffff00;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        #attack-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        #attack-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        #attack-btn:active {
            transform: translateY(0);
        }
        #attack-btn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }
        #reset-btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        #reset-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="loading">Loading...</div>

    <div id="controls">
        <button id="attack-btn" disabled>⚔️ ATTACK</button>
        <button id="reset-btn">🔄 Reset</button>
    </div>

    <script type="module">
        import init, { CanvasApplication } from './terradeck_wasm.js';

        async function initGame() {
            await init();
            
            try {
                document.getElementById('loading').style.display = 'none';
                const app = new CanvasApplication('game-canvas');
                app.run();
                
                const canvas = document.getElementById('game-canvas');
                canvas.addEventListener('mousedown', (e) => app.on_mousedown(e));
                canvas.addEventListener('keydown', (e) => app.on_keydown(e));
                canvas.addEventListener('mousemove', (e) => app.on_mousemove(e));
                canvas.addEventListener('mouseup', (e) => app.on_mouseup(e));
                
                // Attack button
                const attackBtn = document.getElementById('attack-btn');
                attackBtn.addEventListener('click', () => {
                    app.execute_attack();
                    app.update_attack_button();
                });
                
                // Reset button
                const resetBtn = document.getElementById('reset-btn');
                resetBtn.addEventListener('click', () => {
                    app.reset_game();
                });
                
                // Expose functions to global scope for HTML buttons
                window.terradeck_app = app;
                
                console.log('Terra-Deck WASM initialized!');
                console.log('Gameplay: Select player card → Select opponent card → Click ATTACK');
            } catch (err) {
                console.error('Failed to initialize:', err);
                document.getElementById('loading').textContent = 'Error loading game';
                document.getElementById('loading').style.color = '#ff0000';
            }
        }

        initGame();
    </script>
</body>
</html>
